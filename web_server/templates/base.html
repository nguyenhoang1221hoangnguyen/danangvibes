<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DaNang Vibes{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-cta: #f97316;
      --color-cta-dark: #ea580c;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-text: #1e293b;
      --color-muted: #64748b;
      --color-border: #e2e8f0;
      --color-blue-soft: #dbeafe;
      --color-orange-soft: #ffedd5;
      --color-green-soft: #dcfce7;
      --color-red-soft: #fee2e2;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-card: 0 18px 48px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.07);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 8% 0%, rgba(37, 99, 235, 0.14), transparent 28rem),
        radial-gradient(circle at 92% 8%, rgba(249, 115, 22, 0.13), transparent 24rem),
        linear-gradient(180deg, #ffffff 0%, var(--color-bg) 32rem);
      color: var(--color-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    a { color: var(--color-primary); font-weight: 700; }
    a:hover { color: var(--color-primary-dark); }
    code { border-radius: 8px; background: #eef2ff; color: #3730a3; padding: 2px 6px; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(2.2rem, 6vw, 4.7rem); line-height: 0.95; letter-spacing: -0.055em; }
    h2 { font-size: clamp(1.45rem, 3vw, 2.25rem); line-height: 1.08; letter-spacing: -0.035em; }
    h3 { font-size: 1.1rem; line-height: 1.2; }

    .skip-link {
      position: fixed;
      left: 16px;
      top: 12px;
      z-index: 10;
      transform: translateY(-140%);
      border-radius: 999px;
      background: var(--color-text);
      color: white;
      padding: 10px 14px;
    }
    .skip-link:focus { transform: translateY(0); }

    .site-header, main { max-width: 1180px; margin: auto; padding: 24px; }
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { display: inline-grid; gap: 0; color: var(--color-text); text-decoration: none; }
    .brand strong { font-size: 1.05rem; letter-spacing: -0.02em; }
    .brand span { color: var(--color-muted); font-size: 0.88rem; font-weight: 600; }
    .nav-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .nav-actions a { text-decoration: none; }

    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 3px;
    }

    .card {
      margin-bottom: 20px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }
    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 6vw, 52px);
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 55%, #fff7ed 100%);
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -70px;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(249, 115, 22, 0.16);
    }
    .hero > * { position: relative; z-index: 1; }
    .hero p { max-width: 720px; }

    .section-header { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .section-header p { color: var(--color-muted); margin-bottom: 0; }
    .eyebrow, .pill, .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(37, 99, 235, 0.09);
      color: var(--color-primary-dark);
      font-size: 0.9rem;
      font-weight: 800;
    }
    .eyebrow { margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
    .status-badge--published { background: var(--color-green-soft); color: #166534; }
    .status-badge--draft { background: var(--color-orange-soft); color: #9a3412; }
    .status-badge--danger { background: var(--color-red-soft); color: #991b1b; }

    .grid, .event-grid, .admin-grid, .result-grid, .review-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }
    .event-card, .admin-event-card, .result-card, .review-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: white;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .event-card, .admin-event-card, .review-card { padding: 18px; }
    .event-card h2, .admin-event-card h2 { margin-bottom: 8px; }
    .event-card__meta, .helper-text, .muted { color: var(--color-muted); }
    .event-card__actions, .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 14px; }

    .event-meta { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0 22px; color: var(--color-muted); font-weight: 700; }
    .stat-grid, .metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .stat-card, .metric {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.76);
      padding: 16px;
    }
    .stat-card strong, .metric strong { display: block; color: var(--color-primary-dark); font-size: 1.7rem; line-height: 1.05; overflow-wrap: anywhere; }
    .stat-card span, .metric span { color: var(--color-muted); font-size: 0.93rem; }

    .search-layout { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr); gap: 18px; align-items: stretch; }
    .search-card { display: flex; flex-direction: column; justify-content: space-between; gap: 16px; }
    .search-card--primary { border: 2px solid rgba(249, 115, 22, 0.28); }
    .form-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; }
    .field { display: grid; gap: 8px; margin-bottom: 12px; }
    .field label, .checkbox-field { color: var(--color-text); font-weight: 800; }
    .checkbox-field { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
    .checkbox-field input { width: auto; min-height: auto; }

    input, select, textarea, button, .button {
      min-height: 44px;
      border-radius: var(--radius-sm);
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--color-border);
      background: white;
      color: var(--color-text);
      padding: 12px 14px;
    }
    textarea { resize: vertical; }
    input[type="file"] { padding: 10px 12px; }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      background: var(--color-primary);
      color: white;
      cursor: pointer;
      font-weight: 800;
      padding: 12px 16px;
      text-decoration: none;
      transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
    }
    button:hover, .button:hover { background: var(--color-primary-dark); color: white; transform: translateY(-1px); }
    button:active, .button:active { transform: translateY(0); }
    .button--cta { background: var(--color-cta); box-shadow: 0 14px 28px rgba(249, 115, 22, 0.24); }
    .button--cta:hover { background: var(--color-cta-dark); }
    .button--secondary { background: #e0f2fe; color: #075985; }
    .button--secondary:hover { background: #bae6fd; color: #075985; }
    .button--ghost { border: 1px solid var(--color-border); background: white; color: var(--color-primary-dark); }
    .button--ghost:hover { background: #eff6ff; color: var(--color-primary-dark); }
    .button--danger { background: #dc2626; }
    .button--danger:hover { background: #b91c1c; }

    .results-region { margin-top: 24px; scroll-margin-top: 24px; }
    .results-panel { background: rgba(255, 255, 255, 0.9); }
    .result-card__body { display: grid; gap: 10px; padding: 14px; }
    .result-title { margin: 0; font-weight: 900; }
    .download-button { width: 100%; }
    img.thumb { display: block; width: 100%; height: 190px; object-fit: cover; background: #e2e8f0; }
    img.qr { width: 180px; max-width: 100%; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: white; }

    .notice, .empty-state {
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .notice { border: 1px solid #fed7aa; background: var(--color-orange-soft); color: #7c2d12; }
    .empty-state { border: 1px dashed #cbd5e1; background: #f8fafc; color: var(--color-muted); }
    .donation-card { margin-top: 18px; border-color: #fed7aa; background: #fff7ed; }
    .admin-note { border-color: #bfdbfe; background: #eff6ff; color: #1e40af; }
    .review-card { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 18px; align-items: start; }
    .review-card img.thumb { height: 180px; border-radius: var(--radius-sm); }
    .review-meta { display: grid; gap: 8px; }

    .htmx-indicator { opacity: 0; transition: opacity 180ms ease; color: var(--color-muted); }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

    @media (max-width: 760px) {
      .site-header, main { padding: 18px; }
      .site-header, .section-header { align-items: stretch; flex-direction: column; }
      .nav-actions, .actions, .event-card__actions { display: grid; grid-template-columns: 1fr; width: 100%; }
      .hero { padding: 26px; }
      .stat-grid, .metric-grid, .search-layout, .form-row, .review-card { grid-template-columns: 1fr; }
      button, .button { width: 100%; }
      img.thumb { height: 210px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition: none !important; }
      button:hover, .button:hover { transform: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Bỏ qua đến nội dung chính</a>
  <header class="site-header" aria-label="Điều hướng chính">
    <a class="brand" href="/">
      <strong>DaNang Vibes</strong>
      <span>Race photo finder</span>
    </a>
    <nav class="nav-actions" aria-label="Liên kết chính">
      <a class="button button--ghost" href="/">Sự kiện</a>
      <a class="button button--secondary" href="/admin/">Admin</a>
    </nav>
  </header>
  <main id="main-content">{% block content %}{% endblock %}</main>
</body>
</html>
