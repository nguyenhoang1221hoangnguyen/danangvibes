<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DaNang Vibes Processing{% endblock %}</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f8fafc; color: #111827; }
    header { background: #111827; color: white; padding: 18px 24px; }
    main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    label { display: block; margin: 12px 0; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 10px; border: 1px solid #d1d5db; border-radius: 10px; font: inherit; }
    input[type="checkbox"] { width: auto; }
    button { background: #2563eb; color: white; border: 0; border-radius: 10px; padding: 11px 16px; font-weight: 700; cursor: pointer; }
    code { background: #f3f4f6; padding: 2px 5px; border-radius: 6px; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 12px; padding: 12px; }
    .notice { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 12px; }
    .success { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 12px; }
  </style>
</head>
<body>
<header>
  <strong>DaNang Vibes Processing App</strong>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
